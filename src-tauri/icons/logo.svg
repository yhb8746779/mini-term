<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1816"/>
      <stop offset="100%" stop-color="#100f0d"/>
    </linearGradient>

    <!-- 铜色光晕 -->
    <radialGradient id="glow" cx="0.35" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#c8805a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8805a" stop-opacity="0"/>
    </radialGradient>

    <!-- 提示符渐变 -->
    <linearGradient id="prompt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4975e"/>
      <stop offset="100%" stop-color="#c8805a"/>
    </linearGradient>

    <!-- 光标渐变 -->
    <linearGradient id="cursor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8805a"/>
      <stop offset="100%" stop-color="#b07050"/>
    </linearGradient>

    <!-- AI 状态点发光 -->
    <radialGradient id="ai-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6bb87a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#6bb87a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6bb87a" stop-opacity="0"/>
    </radialGradient>

    <!-- 外框阴影 -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- 内发光 -->
    <filter id="inner-glow" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- 主容器：圆角矩形终端窗口 -->
  <rect x="56" y="56" width="400" height="400" rx="72" ry="72"
        fill="url(#bg)" filter="url(#shadow)"
        stroke="#2a2824" stroke-width="2"/>

  <!-- 光晕层 -->
  <rect x="56" y="56" width="400" height="400" rx="72" ry="72"
        fill="url(#glow)"/>

  <!-- 分屏分隔线（竖线，体现 split 功能） -->
  <line x1="296" y1="100" x2="296" y2="420"
        stroke="#2a2824" stroke-width="2" stroke-opacity="0.5"/>

  <!-- 左侧面板：主提示符 > -->
  <path d="M 120 248 L 172 280 L 120 312"
        fill="none" stroke="url(#prompt)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左侧面板：光标 -->
  <rect x="192" y="264" width="10" height="32" rx="3"
        fill="url(#cursor)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- 左侧面板：模拟文本行 -->
  <rect x="120" y="340" width="80" height="5" rx="2.5" fill="#5c5850" opacity="0.4"/>
  <rect x="120" y="360" width="52" height="5" rx="2.5" fill="#5c5850" opacity="0.25"/>

  <!-- 右侧面板：次级提示符 -->
  <path d="M 320 252 L 344 268 L 320 284"
        fill="none" stroke="#5c5850" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- 右侧面板：模拟文本行 -->
  <rect x="360" y="262" width="6" height="20" rx="2" fill="#5c5850" opacity="0.35"/>
  <rect x="320" y="308" width="88" height="4" rx="2" fill="#5c5850" opacity="0.25"/>
  <rect x="320" y="326" width="60" height="4" rx="2" fill="#5c5850" opacity="0.18"/>
  <rect x="320" y="344" width="72" height="4" rx="2" fill="#5c5850" opacity="0.18"/>

  <!-- AI 状态指示点（右上角） -->
  <circle cx="408" cy="112" r="16" fill="url(#ai-glow)"/>
  <circle cx="408" cy="112" r="6" fill="#6bb87a">
    <animate attributeName="r" values="6;7.5;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
